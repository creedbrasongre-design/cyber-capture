<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber CTF — Blender GLB Robot FIXED</title>
  <link rel="stylesheet" href="style.css" />

  <!-- This import map fixes the GLTFLoader problem in many browsers/GitHub Pages projects. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="hud">
    <div class="title">Cyber CTF — Blender GLB Robot</div>
    <div>Move: <b>WASD</b> or <b>Arrow Keys</b></div>
    <div>Goal: capture the blue flag and return to the red base.</div>
    <div id="status">Loading robot model...</div>
    <div id="score">Score: 0 / 3</div>
  </div>

  <canvas id="game"></canvas>

  <script type="module" src="game.js"></script>
</body>
</html>
